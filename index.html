<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매장별 EBG 진행현황</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --bg:#14161A;
    --bg-soft:#1B1E23;
    --rail:#223038;
    --rail-line:#33454E;
    --paper:#EFEAE0;
    --paper-dark:#E4DDCB;
    --ink:#23211D;
    --ink-soft:#6B655A;
    --p0:#C1392B;
    --p1:#D98032;
    --p2:#C7A339;
    --p3:#5F8B5A;
    --status-ok:#5F8B5A;
    --status-wait:#7C8A94;
    --status-blocked:#C1392B;
    --status-done:#3A6EA5;
    --accent:#E2622F;
    --text-onDark:#EDEAE2;
    --text-onDark-soft:#9BA3A8;
    --font-display:'Oswald',sans-serif;
    --font-mono:'IBM Plex Mono',monospace;
    --font-body:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text-onDark);font-family:var(--font-body);-webkit-font-smoothing:antialiased;}
  a{color:inherit;}
  button{font-family:inherit;}
 
  /* ---------- Login gate ---------- */
  #loginGate{
    position:fixed;inset:0;background:radial-gradient(circle at 50% 30%, #1B2126, #101215 75%);
    display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;
  }
  .login-card{
    width:100%;max-width:360px;background:var(--bg-soft);border:1px solid var(--rail-line);
    border-top:3px solid var(--accent);border-radius:8px;padding:30px 28px;box-shadow:0 20px 50px rgba(0,0,0,.5);
  }
  .login-card .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.18em;color:var(--text-onDark-soft);margin-bottom:10px;}
  .login-card h2{font-family:var(--font-display);text-transform:uppercase;font-size:22px;margin:0 0 6px;letter-spacing:.02em;}
  .login-card p.desc{font-size:12.5px;color:var(--text-onDark-soft);margin:0 0 22px;line-height:1.5;}
  .login-field{margin-bottom:14px;}
  .login-field label{display:block;font-family:var(--font-mono);font-size:11px;color:var(--text-onDark-soft);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;}
  .login-field input{
    width:100%;padding:10px 12px;background:var(--rail);border:1px solid var(--rail-line);border-radius:5px;
    color:var(--text-onDark);font-family:var(--font-mono);font-size:14px;outline:none;
  }
  .login-field input:focus{border-color:var(--accent);}
  .login-btn{
    width:100%;padding:11px;margin-top:6px;background:var(--accent);border:none;border-radius:5px;
    color:#fff;font-family:var(--font-mono);font-weight:600;font-size:13px;letter-spacing:.04em;
    text-transform:uppercase;cursor:pointer;
  }
  .login-btn:hover{filter:brightness(1.08);}
  .login-error{color:#E28080;font-size:12px;font-family:var(--font-mono);margin-top:10px;min-height:16px;}
  .login-card.shake{animation:shake .35s;}
  @keyframes shake{
    0%,100%{transform:translateX(0);} 25%{transform:translateX(-8px);}
    50%{transform:translateX(8px);} 75%{transform:translateX(-6px);}
  }
 
  #appRoot{display:none;}
 
  /* ---------- Header rail ---------- */
  .rail-header{
    background:linear-gradient(180deg,var(--bg-soft),var(--bg));
    border-bottom:3px solid var(--rail-line);
    padding:28px 32px 20px;
    position:relative;
  }
  .rail-header::after{
    content:"";position:absolute;left:0;right:0;bottom:-3px;height:3px;
    background:linear-gradient(90deg,var(--accent),transparent 60%);
  }
  .eyebrow{
    font-family:var(--font-mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--text-onDark-soft);display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;
  }
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);display:inline-block;animation:pulse 1.8s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.25;}}
  @media (prefers-reduced-motion:reduce){.live-dot{animation:none;}}
  h1{
    font-family:var(--font-display);font-weight:700;font-size:clamp(26px,3.6vw,40px);
    letter-spacing:.01em;margin:0 0 6px;text-transform:uppercase;color:var(--text-onDark);
  }
  .subtitle{color:var(--text-onDark-soft);font-size:14px;margin:0 0 6px;}
  .subtitle b{color:var(--text-onDark);font-weight:600;}
  .freshness{font-family:var(--font-mono);font-size:11.5px;color:#7EA8C4;margin:0 0 20px;}
 
  .header-actions{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:20px;}
  .upload-btn,.reset-data-btn{
    font-family:var(--font-mono);font-size:11.5px;background:var(--rail);color:var(--text-onDark);
    border:1px solid var(--rail-line);border-radius:5px;padding:8px 14px;cursor:pointer;
  }
  .upload-btn:hover{border-color:var(--accent);}
  .reset-data-btn{color:var(--text-onDark-soft);background:transparent;}
  .reset-data-btn:hover{color:var(--text-onDark);border-color:var(--status-blocked);}
  .upload-status{font-family:var(--font-mono);font-size:11px;color:var(--text-onDark-soft);}
  .gsheet-row{margin-top:2px;}
  .gsheet-label{font-family:var(--font-mono);font-size:11.5px;color:var(--text-onDark-soft);}
 
  .stat-row{display:flex;flex-wrap:wrap;gap:10px;}
  .stat-chip{
    font-family:var(--font-mono);background:var(--rail);border:1px solid var(--rail-line);
    border-radius:6px;padding:8px 14px;min-width:96px;
  }
  .stat-chip .num{font-size:22px;font-weight:600;line-height:1;display:block;}
  .stat-chip .lbl{font-size:10px;color:var(--text-onDark-soft);letter-spacing:.06em;text-transform:uppercase;margin-top:4px;display:block;}
  .stat-chip.wait .num{color:var(--status-wait);}
  .stat-chip.blocked .num{color:var(--status-blocked);}
  .stat-chip.done .num{color:var(--status-done);}
  .stat-chip.voc .num{color:#7EA8C4;}
 
  /* ---------- Controls ---------- */
  .controls{
    background:var(--bg-soft);border-bottom:1px solid var(--rail-line);
    padding:14px 32px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;position:sticky;top:0;z-index:5;
  }
  .controls select,.controls input{
    font-family:var(--font-mono);font-size:12.5px;background:var(--rail);color:var(--text-onDark);
    border:1px solid var(--rail-line);border-radius:5px;padding:8px 10px;outline:none;
  }
  .controls select:focus,.controls input:focus{border-color:var(--accent);}
  .controls input[type="search"]{min-width:220px;}
  .controls .reset-btn{
    font-family:var(--font-mono);font-size:12px;background:transparent;color:var(--text-onDark-soft);
    border:1px solid var(--rail-line);border-radius:5px;padding:8px 12px;cursor:pointer;
  }
  .controls .reset-btn:hover{color:var(--text-onDark);border-color:var(--accent);}
  .count-badge{
    margin-left:auto;font-family:var(--font-mono);font-size:12.5px;color:var(--text-onDark-soft);
    white-space:nowrap;
  }
  .count-badge b{color:var(--text-onDark);}
 
  /* ---------- Board / tickets ---------- */
  .board-wrap{padding:24px 32px 60px;}
  .board{display:flex;align-items:flex-start;gap:24px;}
  @media (max-width:900px){.board{flex-direction:column;}}
 
  .group-section{flex:1;min-width:0;}
  @media (max-width:900px){.group-section{width:100%;}}
 
  .group-header{
    display:flex;flex-direction:column;align-items:flex-start;gap:4px;
    margin:0 0 14px;padding-bottom:8px;border-bottom:2px solid var(--rail-line);
  }
  .group-header h2{
    font-family:var(--font-display);font-size:22px;font-weight:700;text-transform:uppercase;
    letter-spacing:.03em;color:var(--accent);margin:0;
  }
  .group-meta{display:block;font-family:var(--font-mono);font-size:11.5px;color:var(--text-onDark-soft);line-height:1.5;}
  .board-grid{display:flex;flex-direction:column;gap:20px;margin-bottom:36px;}
 
  .ticket{
    background:var(--paper);color:var(--ink);border-radius:6px;
    display:flex;flex-direction:column;
    box-shadow:0 6px 16px rgba(0,0,0,.28);opacity:0;transform:translateY(8px);
    animation:rise .5s ease forwards;
  }
  @media (prefers-reduced-motion:reduce){.ticket{animation:none;opacity:1;transform:none;}}
  @keyframes rise{to{opacity:1;transform:translateY(0);}}
 
  .ticket-tab{
    background:var(--rail);color:var(--text-onDark);padding:12px 16px;border-radius:6px 6px 0 0;
    cursor:pointer;user-select:none;display:flex;justify-content:space-between;align-items:center;gap:10px;
  }
  .ticket-tab.is-blocked{background:linear-gradient(90deg,#3A2323,#2A1414);border-left:4px solid var(--status-blocked);}
  .ticket-tab .store-name{font-family:var(--font-display);font-weight:600;font-size:18px;letter-spacing:.02em;text-transform:uppercase;}
  .ticket-tab .meta{font-family:var(--font-mono);font-size:11px;color:var(--text-onDark-soft);white-space:nowrap;}
  .ticket-tab .caret{font-size:12px;color:var(--text-onDark-soft);transition:transform .2s;}
  .ticket.collapsed .caret{transform:rotate(-90deg);}
 
  .perf{position:relative;height:0;margin:0 16px;border-top:2px dashed rgba(35,33,29,.28);}
  .perf::before,.perf::after{content:"";position:absolute;top:-7px;width:14px;height:14px;border-radius:50%;background:var(--bg);}
  .perf::before{left:-23px;} .perf::after{right:-23px;}
 
  .ticket-body{padding:6px 16px 14px;flex:1;}
  .ticket.collapsed .ticket-body{display:none;}
 
  .item{padding:12px 0;border-bottom:1px solid rgba(35,33,29,.12);}
  .item:last-child{border-bottom:none;}
  .item-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
  .tag{
    font-family:var(--font-mono);font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:3px;
    text-transform:uppercase;letter-spacing:.03em;color:#fff;
  }
  .tag.cat{background:rgba(35,33,29,.55);}
  .status-tag{
    font-family:var(--font-mono);font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:3px;
    text-transform:uppercase;margin-left:auto;
  }
  .status-ok{background:rgba(95,139,90,.18);color:#3E6B3A;}
  .status-wait{background:rgba(124,138,148,.2);color:#556067;}
  .status-blocked{background:var(--status-blocked);color:#fff;}
  .status-done{background:rgba(58,110,165,.18);color:var(--status-done);}
 
  .item-title{font-weight:600;font-size:14px;margin:0 0 4px;line-height:1.35;}
  .item-kpi{font-size:12.5px;color:var(--ink-soft);margin:0 0 6px;line-height:1.4;white-space:pre-line;}
  .item-voc{
    font-size:12px;font-style:italic;color:#5A4A3A;border-left:2px solid var(--p1);
    padding:2px 0 2px 8px;margin:0 0 6px;background:rgba(217,128,50,.08);white-space:pre-line;
  }
  .item-note{
    font-size:12px;color:#4A5A52;border-left:2px solid var(--status-ok);
    padding:2px 0 2px 8px;margin:0 0 6px;background:rgba(95,139,90,.08);
    white-space:pre-line;line-height:1.4;
  }
  .item-foot{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:10.5px;color:var(--ink-soft);}
 
  .empty-msg{
    text-align:center;color:var(--text-onDark-soft);font-family:var(--font-mono);font-size:13px;
    padding:60px 20px;display:none;
  }
 
  footer{
    text-align:center;color:var(--text-onDark-soft);font-family:var(--font-mono);font-size:11px;
    padding:18px;border-top:1px solid var(--rail-line);
  }
 
  ::selection{background:var(--accent);color:#fff;}
  select:focus-visible,input:focus-visible,.reset-btn:focus-visible,.ticket-tab:focus-visible,
  .upload-btn:focus-visible,.reset-data-btn:focus-visible,.login-btn:focus-visible{
    outline:2px solid var(--accent);outline-offset:2px;
  }
</style>
</head>
<body>
 
<div id="loginGate">
  <div class="login-card" id="loginCard">
    <div class="eyebrow">직원 열람용</div>
    <h2>접속 인증</h2>
    <p class="desc">로운 매장별 EBG 진행현황입니다.<br>아이디와 비밀번호를 입력해주세요.</p>
    <div class="login-field">
      <label for="loginId">아이디</label>
      <input id="loginId" type="text" autocomplete="username">
    </div>
    <div class="login-field">
      <label for="loginPw">비밀번호</label>
      <input id="loginPw" type="password" autocomplete="current-password">
    </div>
    <button class="login-btn" id="loginBtn">로그인</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>
 
<div id="appRoot">
  <header class="rail-header">
    <div class="eyebrow"><span class="live-dot"></span> LIVE BOARD · <span id="clock">--:--:--</span></div>
    <h1>매장별 EBG 진행현황</h1>
    <p class="subtitle">로운 전직원 EBG 제목 및 진척상황</p>
    <p class="freshness" id="freshness">데이터 기준: 2026-07-20 (기본 데이터)</p>
    <div class="header-actions">
      <button class="upload-btn" id="uploadBtn">⤒ 새 엑셀 업로드</button>
      <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none;">
      <button class="reset-data-btn" id="resetDataBtn">기본 데이터로 초기화</button>
      <span class="upload-status" id="uploadStatus"></span>
    </div>
    <div class="header-actions gsheet-row">
      <span class="gsheet-label">🔗 구글시트 연동</span>
      <button class="upload-btn" id="syncNowBtn">지금 동기화</button>
      <span class="upload-status" id="gsyncStatus"></span>
    </div>
    <div class="stat-row" id="statRow"></div>
  </header>
 
  <div class="controls">
    <select id="fCategory"><option value="">분류: 전체</option></select>
    <select id="fStatus"><option value="">상태: 전체</option></select>
    <input id="fSearch" type="search" placeholder="검색: EBG 제목 · 고객 생소리 · 해결사">
    <button class="reset-btn" id="resetBtn">필터 초기화</button>
    <button class="reset-btn" id="toggleAllBtn">전체 접기</button>
    <span class="count-badge">표시 중 <b id="countShown">0</b> / <span id="countTotal">0</span>건</span>
  </div>
 
  <div class="board-wrap">
    <div class="board" id="board"></div>
    <div class="empty-msg" id="emptyMsg">조건에 맞는 과제가 없습니다. 필터를 조정해보세요.</div>
  </div>
 
  <footer id="footerNote">본 대시보드는 &#39;매장별 EBG 제목&#39; 원본 트래커를 기초로 생성되었습니다.</footer>
</div>

    {label:'전체 과제', val:total, cls:''},
    {label:'진행 중', val:running, cls:''},
    {label:'시작 전', val:waiting, cls:'wait'},
    {label:'중단됨', val:suspended, cls:'blocked'},
    {label:'완료됨', val:completed, cls:'done'},
    {label:'고객생소리 기반', val:(total? (voc+' / '+total) : '0 / 0'), cls:'voc'},
  ];
  document.getElementById('statRow').innerHTML = chips.map(c=>
    `<div class="stat-chip ${c.cls}"><span class="num">${c.val}</span><span class="lbl">${c.label}</span></div>`
  ).join('');
  document.getElementById('countTotal').textContent = total;
}
 
function populateFilterOptions(){
  const catSel = document.getElementById('fCategory');
  const statusSel = document.getElementById('fStatus');
  [catSel, statusSel].forEach(sel=>{
    while(sel.options.length > 1) sel.remove(1);
  });
  uniqueSorted(DATA.items.map(i=>i.category)).forEach(v=>{
    const opt = document.createElement('option'); opt.value=v; opt.textContent=v; catSel.appendChild(opt);
  });
  uniqueSorted(DATA.items.map(i=>i.status)).forEach(v=>{
    const opt = document.createElement('option'); opt.value=v; opt.textContent=v; statusSel.appendChild(opt);
  });
}
 
// 매장을 3개 셀(그룹)로 묶어서 보여준다. 그룹에 속하지 않은 매장이 데이터에 있으면
// '미분류' 그룹으로 따로 모아 누락 없이 표시한다.
const STORE_GROUPS = [
  { name: '1셀', stores: ['강서','야탑','송파','의정부','일산'] },
  { name: '2셀', stores: ['부산대','괴정','순천','광주역','청량리','해운대'] },
  { name: '3셀', stores: ['동탄','광명','평촌','신촌','중앙로','수원'] },
];
 
function buildTicketEl(store, filtered){
  const storeItemsAll = DATA.items.filter(i=>i.store===store);
  const storeItemsShown = filtered.filter(i=>i.store===store)
    .sort((a,b)=>(PRIO_ORDER[a.priority]??9)-(PRIO_ORDER[b.priority]??9));
  if(storeItemsShown.length===0) return null;
 
  const suspendedCount = storeItemsAll.filter(i=>i.status==='중단됨').length;
  const completedCount = storeItemsAll.filter(i=>i.status==='완료됨').length;
  const runningCount = storeItemsAll.filter(i=>i.status==='진행 중').length;
  const waitingCount = storeItemsAll.filter(i=>i.status==='시작 전').length;
 
  const ticket = document.createElement('div');
  ticket.className = 'ticket';
 
  const itemsHtml = storeItemsShown.map(i=>`
    <div class="item">
      <div class="item-top">
        <span class="tag" style="background:${prioColor(i.priority)}">${i.priority||'-'}</span>
        <span class="tag cat">${escapeHtml(i.category)||'-'}</span>
        <span class="status-tag ${statusClass(i.status)}">${escapeHtml(i.status)||'-'}</span>
      </div>
      <p class="item-title">${escapeHtml(i.title)}</p>
      <p class="item-kpi">🎯 ${escapeHtml(i.kpi)||'-'}</p>
      ${i.voc ? `<p class="item-voc">“${escapeHtml(i.voc)}”</p>` : ''}
      ${i.note ? `<p class="item-note">📝 ${escapeHtml(i.note)}</p>` : ''}
      <div class="item-foot"><span>${escapeHtml(i.solver)||'-'}</span><span>${escapeHtml(i.date)||'-'}</span></div>
    </div>
  `).join('');
 
  ticket.innerHTML = `
    <div class="ticket-tab ${suspendedCount>0?'is-blocked':''}" tabindex="0" role="button" aria-expanded="true">
      <span class="store-name">${escapeHtml(store)}</span>
      <span class="meta">${storeItemsShown.length}/${storeItemsAll.length}건 · 진행중 ${runningCount} · 시작전 ${waitingCount} · 중단 ${suspendedCount} · 완료 ${completedCount}</span>
      <span class="caret">▼</span>
    </div>
    <div class="perf"></div>
    <div class="ticket-body">${itemsHtml}</div>
  `;
  ticket.querySelector('.ticket-tab').addEventListener('click', ()=>{
    toggleTicketCollapse(ticket);
  });
  return ticket;
}
 
function renderBoard(filtered){
  const board = document.getElementById('board');
  board.innerHTML = '';
  let shownAny = 0;
  let animIdx = 0;
 
  const groupedStoreSet = new Set(STORE_GROUPS.flatMap(g=>g.stores));
  const ungrouped = DATA.stores.filter(s=>!groupedStoreSet.has(s));
  const groups = ungrouped.length>0 ? [...STORE_GROUPS, {name:'미분류', stores:ungrouped}] : STORE_GROUPS;
 
  groups.forEach(group=>{
    const groupStores = group.stores.filter(s=>DATA.stores.includes(s));
    const ticketEls = [];
    groupStores.forEach(store=>{
      const el = buildTicketEl(store, filtered);
      if(el){
        animIdx++;
        el.style.animationDelay = (Math.min(animIdx,20)*0.03)+'s';
        ticketEls.push(el);
      }
    });
    if(ticketEls.length===0) return;
    shownAny += ticketEls.length;
 
    const section = document.createElement('div');
    section.className = 'group-section';
    section.innerHTML = `
      <div class="group-header">
        <h2>${escapeHtml(group.name)}</h2>
        <span class="group-meta">${escapeHtml(groupStores.join(' · '))}</span>
      </div>
    `;
    const grid = document.createElement('div');
    grid.className = 'board-grid';
    ticketEls.forEach(el=>grid.appendChild(el));
    section.appendChild(grid);
    board.appendChild(section);
  });
 
  document.getElementById('emptyMsg').style.display = shownAny===0 ? 'block' : 'none';
}
 
function toggleTicketCollapse(ticket){
  const collapsing = !ticket.classList.contains('collapsed');
  ticket.classList.toggle('collapsed', collapsing);
  if(collapsing){
    ticket.style.height = 'auto';
  } else {
    const h = ticket.dataset.equalizedHeight;
    ticket.style.height = h ? h+'px' : 'auto';
  }
}
 
// 3. 매장별 카드의 높이를 서로 맞춘다 (내용이 짧은 매장의 카드도 가장 긴 카드 기준으로 통일).
function equalizeTicketHeights(){
  const tickets = document.querySelectorAll('.ticket:not(.collapsed)');
  if(tickets.length===0) return;
  tickets.forEach(t=>{ t.style.height='auto'; });
  let max = 0;
  tickets.forEach(t=>{ max = Math.max(max, t.getBoundingClientRect().height); });
  tickets.forEach(t=>{
    t.style.height = max+'px';
    t.dataset.equalizedHeight = String(max);
  });
}
 
function applyFilters(){
  const cat = document.getElementById('fCategory').value;
  const status = document.getElementById('fStatus').value;
  const q = document.getElementById('fSearch').value.trim().toLowerCase();
 
  const filtered = DATA.items.filter(i=>{
    if(cat && i.category!==cat) return false;
    if(status && i.status!==status) return false;
    if(q){
      const hay = (i.title+' '+i.voc+' '+i.solver+' '+i.kpi).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
 
  document.getElementById('countShown').textContent = filtered.length;
  renderBoard(filtered);
  equalizeTicketHeights();
}
 
function renderAll(){
  renderStats();
  populateFilterOptions();
  applyFilters();
}
 
['fCategory','fStatus'].forEach(id=>document.getElementById(id).addEventListener('change', applyFilters));
document.getElementById('fSearch').addEventListener('input', applyFilters);

/* ==================== 엑셀 실시간 업로드 & 파싱 ==================== */
function normStr(v){
  if(v===null || v===undefined) return '';
  return String(v).trim();
}
 
function normDate(v){
  if(v===null || v===undefined || v==='') return '';
  if(v instanceof Date && !isNaN(v)){
    return v.toISOString().slice(0,10);
  }
  if(typeof v === 'number'){
    if(v>=20200101 && v<=20301231){
      const s = String(Math.trunc(v));
      return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
    }
    // Excel 날짜 일련번호로 추정되는 범위
    if(v>20000 && v<60000){
      const epoch = Date.UTC(1899,11,30);
      const dt = new Date(epoch + Math.round(v)*86400000);
      if(!isNaN(dt)) return dt.toISOString().slice(0,10);
    }
    return String(v);
  }
  let s = String(v).trim().replace(/\.$/, '');
  let m = s.match(/^(\d{2,4})[.\-](\d{1,2})[.\-](\d{1,2})$/);
  if(m){
    let y = parseInt(m[1],10), mo = parseInt(m[2],10), d = parseInt(m[3],10);
    if(y < 100) y += 2000;
    const dt = new Date(Date.UTC(y, mo-1, d));
    if(!isNaN(dt)) return dt.toISOString().slice(0,10);
  }
  const dt2 = new Date(s);
  if(!isNaN(dt2)) return dt2.toISOString().slice(0,10);
  return s;
}
 
function isPlaceholderTitle(v){
  const s = normStr(v);
  return s === '' || s === 'EBG 제목';
}
 
// SheetJS(xlsx)로 읽은 row 객체를 공통 아이템 형태로 변환한다.
// 시트에 '주요 기록'류 placeholder 문구만 채워진 미사용 행(EBG 제목 = 'EBG 제목' 또는 공백)은 제외한다.
function rowToItem(row, storeName){
  const title = row['EBG 제목'];
  if(isPlaceholderTitle(title)) return null;
  const keys = Object.keys(row);
  const recKey = keys.find(k=>k && k.includes('주요 기록'));
  return {
    store: storeName,
    voc: normStr(row['찾은 고객 생소리']),
    title: normStr(title),
    solver: normStr(row['해결사']),
    category: normStr(row['분류']),
    kpi: normStr(row['목표 KPI']),
    priority: normStr(row['우선순위']),
    status: normStr(row['상태']),
    date: normDate(row['시작일']),
    note: recKey ? normStr(row[recKey]) : '',
  };
}
 
function parseWorkbook(workbook){
  const stores = [];
  const items = [];
  workbook.SheetNames.forEach(sheetName=>{
    const ws = workbook.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(ws, {defval: null, raw: true});
    if(!rows || rows.length===0) return;
    stores.push(sheetName);
    rows.forEach(r=>{
      const item = rowToItem(r, sheetName);
      if(item) items.push(item);
    });
  });
  return { stores, items };
}
 
async function handleFile(file){
  const statusEl = document.getElementById('uploadStatus');
  statusEl.textContent = '읽는 중...';
 
  if(typeof XLSX === 'undefined'){
    statusEl.textContent = '⚠ 엑셀 처리 라이브러리를 불러오지 못했습니다 (네트워크 문제로 추정). 인터넷 연결 상태를 확인하고 페이지를 새로고침한 뒤 다시 시도해주세요.';
    return;
  }
 
  try{
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, {type:'array', cellDates:true});
    const parsed = parseWorkbook(wb);
    if(parsed.items.length===0){
      statusEl.textContent = `⚠ 유효한 EBG 항목을 찾지 못했습니다. (시트 ${wb.SheetNames.length}개 확인함 — 'EBG 제목' 등 열 이름이 원본과 같은지 확인해주세요)`;
      return;
    }
    const payload = { stores: parsed.stores, items: parsed.items, updatedAt: new Date().toISOString(), sourceFile: file.name };
    DATA = payload;
    renderAll();
    setFreshness(payload);
    statusEl.textContent = `✔ ${file.name} 반영 완료 (${parsed.items.length}건)`;
 
    try{
      await window.storage.set(STORAGE_KEY, JSON.stringify(payload), true);
      statusEl.textContent += ' · 공유 저장됨(링크를 가진 모두에게 반영)';
    }catch(e){
      statusEl.textContent += ' · 이 화면에만 적용됨 (다른 사람과 실시간 공유는 아티팩트를 게시(Publish)한 경우에만 가능합니다)';
      console.error('storage.set failed', e);
    }
  }catch(err){
    console.error(err);
    statusEl.textContent = `⚠ 파일을 읽지 못했습니다: ${err.message || err} (.xlsx 파일인지 확인해주세요)`;
  }
}
 
document.getElementById('uploadBtn').addEventListener('click', ()=>document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(file) handleFile(file);
  e.target.value = '';
});

    await window.storage.delete(STORAGE_KEY, true);
  }catch(e){ /* 이미 없거나 삭제 실패 - 무시 */ }
});
 
/* ==================== 구글시트 실시간 동기화 ====================
   공개 범위가 "링크가 있는 모든 사용자 - 뷰어"로 설정된 구글시트만 동작합니다.
   Google이 제공하는 gviz CSV 엔드포인트를 매장(탭) 이름별로 호출해 CSV로 받아옵니다.
   (별도 서버/API 키 없이 브라우저에서 바로 호출 — 시트가 비공개거나, 현재 페이지가 열려 있는
   환경의 네트워크 정책이 외부 요청을 막고 있으면 실패합니다.
   화면에 시트 주소를 노출하지 않기 위해 아래 상수로만 관리한다. */
const KNOWN_STORES = ['신촌','청량리','평촌','수원','중앙로','강서','일산','동탄','송파','순천','괴정','야탑','광주역','부산대','의정부','해운대','광명'];
const GSHEET_ID = '1DnsHZN3ix20x7YgL065o-n-b_3mJXhQZGTpNnXyP1A0';
 
function buildGvizUrl(sheetId, tabName){
  return `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tabName)}`;
}
 
async function fetchTabCSV(sheetId, tabName){
  const res = await fetch(buildGvizUrl(sheetId, tabName), {cache:'no-store'});
  if(!res.ok) throw new Error('HTTP ' + res.status);
  const text = await res.text();
  if(text.trim().slice(0,1) === '<') throw new Error('비공개 시트이거나 탭을 찾을 수 없음');
  const parsed = Papa.parse(text, {header:true, skipEmptyLines:true});
  return parsed.data;
}
 
let syncing = false;
async function syncFromGoogleSheets(){
  if(syncing) return;
  syncing = true;
  const statusEl = document.getElementById('gsyncStatus');
 
  if(typeof Papa === 'undefined'){
    statusEl.textContent = '⚠ CSV 처리 라이브러리를 불러오지 못했습니다 (네트워크 문제로 추정). 새로고침 후 다시 시도해주세요.';
    syncing = false;
    return;
  }
 
  const sheetId = GSHEET_ID;
  statusEl.textContent = '동기화 중...';
 
  const stores = [];
  const items = [];
  const failedTabs = [];
 
  for(const storeName of KNOWN_STORES){
    try{
      const rows = await fetchTabCSV(sheetId, storeName);
      if(!rows || rows.length===0) continue;
      stores.push(storeName);
      rows.forEach(r=>{
        const item = rowToItem(r, storeName);
        if(item) items.push(item);
      });
    }catch(e){
      failedTabs.push(storeName);
    }
  }
 
  if(items.length===0){
    statusEl.textContent = '⚠ 데이터를 가져오지 못했습니다. 시트가 "링크가 있는 모든 사용자"로 공유되어 있는지, 네트워크가 열려 있는지 확인해주세요.';
    syncing = false;
    return;
  }
 
  const payload = { stores, items, updatedAt: new Date().toISOString(), sourceFile: '구글시트 동기화' };
  DATA = payload;
  renderAll();
  setFreshness(payload);
 
  let msg = `✔ 구글시트 동기화 완료 (${items.length}건, ${stores.length}개 매장)`;
  if(failedTabs.length) msg += ` · 불러오지 못한 탭: ${failedTabs.join(', ')}`;
  statusEl.textContent = msg;
 
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(payload), true);
    statusEl.textContent += ' · 공유 저장됨';
  }catch(e){
    statusEl.textContent += ' · 이 화면에만 적용됨 (실시간 공유는 아티팩트 게시 시에만 가능)';
  }
  syncing = false;
}
 
document.getElementById('syncNowBtn').addEventListener('click', syncFromGoogleSheets);
 
/* ==================== 데이터 최신성 표시 ==================== */
function setFreshness(payload){
  const el = document.getElementById('freshness');
  if(!payload){
    el.textContent = '데이터 기준: 2026-07-20 (기본 데이터)';
    return;
  }
  const dt = new Date(payload.updatedAt);
  const label = isNaN(dt) ? payload.updatedAt : dt.toLocaleString('ko-KR',{hour12:false});
  el.textContent = `데이터 기준: ${label} · 출처: ${payload.sourceFile||'업로드 파일'}`;
}
 
/* ==================== 초기화(로그인 성공 후 1회 실행) ==================== */
let appInitialized = false;
async function initApp(){
  if(appInitialized) return;
  appInitialized = true;
 
  DATA = { stores: DEFAULT_DATA.stores.slice(), items: DEFAULT_DATA.items.slice() };
  setFreshness(null);
 
  try{
    const res = await window.storage.get(STORAGE_KEY, true);
    if(res && res.value){
      const stored = JSON.parse(res.value);
      if(stored && Array.isArray(stored.items) && stored.items.length>0){
        DATA = stored;
        setFreshness(stored);
      }
    }
  }catch(e){
    // 저장된 값이 없으면 get이 에러를 던짐 - 기본 데이터 유지
  }
 
  renderAll();
  tick();
 
  if(typeof XLSX === 'undefined'){
    document.getElementById('uploadStatus').textContent = '⚠ 엑셀 처리 라이브러리 로딩 실패 — "새 엑셀 업로드"가 지금은 동작하지 않을 수 있습니다 (네트워크 확인 후 새로고침).';
  }
 
  // 로그인 시 구글시트 자동 동기화 1회 시도 (실패해도 기존/기본 데이터는 그대로 유지됨)
  syncFromGoogleSheets();
}
